<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registation Form</title>
    <link rel="stylesheet" href="Registation_form.css">
</head>

<body>
    
        <h1>School Registation Form</h1>
        <form action="">
           <table>
<tr>
    <td>Roll No :</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Student Name :</td>
    <td>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
    </td>
</tr>

<tr>
    <td>Father's Name :</td>
    <td><input type="text"></td>
</tr>

            <tr>
                <td>Date of Birth :</td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>Mobile No :</td>
                <td>
                    <input type="text" value="+91" size="3" readonly>
                    -
                    <input type="tel" placeholder="Enter Mobile Number">
                </td>
            </tr>

            <tr>
                <td>Email :</td>
                <td><input type="email"></td>
            </tr>

            <tr>
                <td>Password :</td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td>Gender :</td>
                <td>
                    <input type="radio" name="gender" id="male">
                    <label for="male">Male</label>

                    <input type="radio" name="gender" id="female">
                    <label for="female">Female</label>
                </td>
            </tr>

            <tr>
                <td>Department :</td>
                <td>
                    <input type="checkbox" id="cse">
                    <label for="cse">CSE</label>

                    <input type="checkbox" id="it">
                    <label for="it">IT</label>

                    <input type="checkbox" id="ece">
                    <label for="ece">ECE</label>

                    <input type="checkbox" id="civil">
                    <label for="civil">Civil</label>

                    <input type="checkbox" id="mech">
                    <label for="mech">Mech</label>
                </td>
            </tr>

            <tr>
                <td>Course :</td>
                <td>
                    <select>
                        <option>----- Select Current Course -----</option>
                        <option>B.Tech</option>
                        <option>BCA</option>
                        <option>BBA</option>
                        <option>MCA</option>
                        <option>MBA</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Student Photo :</td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td>City :</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Address :</td>
                <td>
                    <textarea rows="4" cols="30"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Register</button>
                </td>
            </tr>

            

           </table>




        </form>
    
</body>

</html>
